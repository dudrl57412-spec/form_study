<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>input tag</title>
  </head>
  <body>
    <form action="#">
      <!-- 글자를 입력하는 칸 -->
      <input type="text" placeholder="아이디" readonly />
      <!-- 비밀번호 입력 -->
      <input type="password" name="" id="" placeholder="비밀번호" />
      <!-- 전화번호 입력 -->
      <input type="tel" name="" id="" placeholder="전화번호" />
      <!-- 숫자남 입력 -->
      <input type="number" name="" id="" placeholder="숫자입력" />
      <!-- 인터넷 주소 입력 -->
      <input type="url" name="" id="" placeholder="주소입력" />
      <!-- 검색어 입력 -->
      <input type="search" name="" id="" placeholder="검색어입력" />
      <!-- 이메일 입력 -->
      <input type="email" name="" id="" placeholder="이메일입력" />
      <!-- 네모 박스 : 여러개 선택 -->
      <input type="checkbox" name="" id="" placeholder="네모박스" />
      <input type="checkbox" name="" id="" placeholder="네모박스" />
      <input type="checkbox" name="" id="" placeholder="네모박스" />
      <!-- 동그라미 선택 버튼 : 하나만 선택 -->
      <input type="radio" name="radio" id="" placeholder="동그라미버튼" />
      <input type="radio" name="radio" id="" placeholder="동그라미버튼" />
      <input type="radio" name="radio" id="" placeholder="동그라미버튼" />
      <!-- 파일을 컴퓨터에서 선택 -->
      <input type="file" name="" id="" placeholder="파일선택" />
      <!-- 그냥 버튼(눌러도 아무 일도 안일어남) -->
      <input type="button" value="로그인" placeholder="일반버튼" disabled />
      <!-- 사진 모양의 버튼 -->
      <input
        type="image"
        src="google.png"
        alt="구글로고"
        placeholder="사진모양버튼"
      />
      <!-- 화면에는 안 보이지만 몰래 값을 저장하는 칸 -->
      <input type="hidden" name="" placeholder="몰래 값 설정하는 버튼" />
      <!-- 날짜 선택하는 달력  -->
      <input type="date" name="" id="" placeholder="달력버튼" />
      <!-- 날짜랑 시간을 같이 선택 -->
      <input type="datetime-local" name="" id="" placeholder="날짜,시간 선택" />
      <!-- 연도와 월을 선택 -->
      <input type="month" name="" id="" placeholder="연도,월 선택" />
      <!-- 몇번째 주 선택 -->
      <input type="week" name="" id="" placeholder="주 선택" />
      <!-- 시간선택 -->
      <input type="time" name="" id="" placeholder="시간선택" />
      <!-- 막대를 움직여서 값을 정하는 칸 (볼륨 조절) -->
      <input type="range" name="" id="" placeholder="막대 값 설정" />
      <!-- 색깔을 선택하는 칸 -->
      <input type="color" name="" id="" placeholder="색깔선택" />
      <!-- 작성한 내용을 서버로 보내는 버튼 -->
      <input type="submit" value="회원가입" placeholder="서버로 보내는 버튼" />
      <!-- 입력한 내용을 모두 지우는 버튼 -->
      <input type="reset" value="취소버튼" placeholder="모두삭제버튼" />
      <!-- 글쓰기 -->
       <textarea name="" id=""></textarea>
    </form>
  </body>
</html>
